name: iOS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build Profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview

jobs:
  build:
    name: Build iOS (${{ github.event.inputs.profile }})
    runs-on: macos-latest
    
    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: ⬢ Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      - name: 🏗 Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 📦 Install dependencies
        run: npm ci


      - name: 📂 Cache Pods
        id: cache-pods
        uses: actions/cache@v4
        with:
          path: |
            ios/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: 🍏 Install CocoaPods (if no cache)
        if: steps.cache-pods.outputs.cache-hit != 'true'
        run: |
          cd ios
          pod install

      - name: 🛠 Build Local (IPA)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_APPLE_ISSUER_ID: ${{ secrets.EXPO_APPLE_ISSUER_ID }}
          EXPO_APPLE_KEY_ID: ${{ secrets.EXPO_APPLE_KEY_ID }}
          EXPO_APPLE_API_KEY: ${{ secrets.EXPO_APPLE_API_KEY }}
        run: |
          PROFILE=${{ github.event.inputs.profile }}
          eas build \
            --platform ios \
            --profile $PROFILE \
            --local \
            --non-interactive \
            --output ./build-ios.ipa

      - name: 📤 Upload Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-${{ github.event.inputs.profile }}-${{ github.run_id }}
          path: ./build-ios.ipa
          if-no-files-found: warn
